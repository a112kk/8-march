<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Открытка к 8 марта</title>
<style>
body{font-family:Arial, sans-serif;margin:0;overflow:hidden;background:black;color:white}
canvas{position:fixed;top:0;left:0;z-index:0}

#virusScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:#00ff9c;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:22px;z-index:5;text-align:center}
#virusText{min-height:40px}

#card{display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:white;color:black;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.3);max-width:520px;text-align:center;z-index:10}

h1{color:#ff2e88}
button{margin-top:20px;padding:12px 22px;font-size:16px;border:none;border-radius:10px;background:#ff2e88;color:white;cursor:pointer}
#hint{margin-top:10px;color:#ff2e88;font-weight:bold}

#specialMessagePopup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:black;color:#ff2e88;padding:30px 40px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.5);font-size:22px;display:none;z-index:20;text-align:center}

.sparkle{position:absolute;width:8px;height:8px;border-radius:50%;background:gold;animation:rise 3s linear infinite}
@keyframes rise{0%{bottom:0;opacity:1}100%{bottom:100vh;opacity:0}}

.confetti-piece{position:fixed;width:10px;height:10px;top:0;animation:fall 3s linear forwards}
@keyframes fall{to{transform:translateY(100vh) rotate(360deg)}}

.heart{position:absolute;width:30px;height:30px;background:red;clip-path:polygon(50% 0%, 61% 12%, 75% 12%, 88% 25%, 88% 38%, 75% 50%, 50% 75%, 25% 50%, 12% 38%, 12% 25%, 25% 12%, 39% 12%);border-radius:50%;cursor:pointer}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="virusScreen">
<div id="virusText">⚠ SYSTEM ERROR ⚠</div>
</div>

<div id="card">
<h1>С 8 Марта 💖</h1>
<p>Это был розыгрыш 😄</p>
<p>Желаю тебе много улыбок, радости и тепла!</p>
<p>Люблю тебя)</p>
<p id="hint">Лови красные сердечки на экране! 💖</p>
<button id="confettiBtn">🎉 Нажми</button>
<div id="score" style="margin-top:10px; font-weight:bold; color:#ff2e88;"></div>
</div>

<div id="specialMessagePopup">Ты маленкая жопка 😘</div>

<script>
document.addEventListener('DOMContentLoaded', function(){

/* MATRIX */
const canvas=document.getElementById('matrix')
const ctx=canvas.getContext('2d')
canvas.width=window.innerWidth
canvas.height=window.innerHeight
const letters='01'
const fontSize=16
const columns=Math.floor(canvas.width/fontSize)
const drops=Array(columns).fill(1)
function draw(){
ctx.fillStyle='rgba(0,0,0,0.05)'
ctx.fillRect(0,0,canvas.width,canvas.height)
ctx.fillStyle='#0f0'
ctx.font=fontSize+'px monospace'
drops.forEach((y,x)=>{
ctx.fillText(letters[Math.floor(Math.random()*letters.length)],x*fontSize,y*fontSize)
if(y*fontSize>canvas.height&&Math.random()>0.975)drops[x]=0
drops[x]++
})
}
setInterval(draw,33)

/* VIRUS MESSAGES WITH TYPE ANIMATION */
const messages=[
"Загрузка подозрительных файлов...",
"Поиск уязвимостей системы...",
"Подключение к серверу...",
"Получение данных...",
"Взлом завершён",
"Твоё сердце у меня 💖"
]
let messageIndex=0
const virusText=document.getElementById('virusText')
function typeMessage(text,callback){
virusText.innerHTML=""
let i=0
const typing=setInterval(()=>{
virusText.innerHTML+=text.charAt(i)
i++
if(i>=text.length){
clearInterval(typing)
setTimeout(callback,400)
}
},30)
}
function nextMessage(){
if(messageIndex<messages.length){
  typeMessage(messages[messageIndex],()=>{
    messageIndex++
    setTimeout(nextMessage,200)
  })
}else{
  setTimeout(showCard,600)
}}
setTimeout(nextMessage,600)

function showCard(){
document.getElementById('virusScreen').style.display='none'
document.getElementById('card').style.display='block'
startSparkles()
startHearts()
}

/* SPARKLES */
function startSparkles(){
for(let i=0;i<40;i++){
const s=document.createElement('div')
s.className='sparkle'
s.style.left=Math.random()*100+'%'
s.style.animationDuration=(2+Math.random()*2)+'s'
document.body.appendChild(s)
}
}

/* CONFETTI */
function confetti(){
for(let i=0;i<120;i++){
const c=document.createElement('div')
c.className='confetti-piece'
c.style.left=Math.random()*window.innerWidth+'px'
c.style.backgroundColor='hsl('+Math.random()*360+',100%,50%)'
c.style.animationDuration=(2+Math.random()*2)+'s'
document.body.appendChild(c)
setTimeout(()=>c.remove(),3000)
}
}
document.getElementById('confettiBtn').addEventListener('click',confetti)

/* HEART GAME */
let score=0
function startHearts(){
  setInterval(()=>{
    const h=document.createElement('div')
    h.className='heart'
    h.style.left=Math.random()*(window.innerWidth-30)+'px'
    h.style.top=Math.random()*(window.innerHeight-30)+'px'
    document.body.appendChild(h)
    h.addEventListener('click',()=>{
      score++
      document.getElementById('score').innerText='Счёт: '+score
      if(score===8){
        const popup=document.getElementById('specialMessagePopup')
        popup.style.display='block'
        setTimeout(()=>{popup.style.display='none'},3000)
      }
      h.remove()
    })
    setTimeout(()=>{if(h.parentNode) h.remove()},4000)
  },700)
}

})
</script>

</body>
</html>
